<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adams Apples — Orchard Management Platform</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&display=swap');

  :root {
    --bg-base:        #06101e;
    --bg-sidebar:     #09152a;
    --bg-card:        #0d1e34;
    --bg-input:       #071222;
    --border:         #16304f;
    --border-subtle:  #0f2540;
    --accent:         #10b981;
    --accent-hover:   #059669;
    --accent-dim:     rgba(16,185,129,0.10);
    --accent-glow:    rgba(16,185,129,0.20);
    --text-primary:   #e8f1ff;
    --text-secondary: #6e8fb5;
    --text-muted:     #364f6e;
    --blue:           #3b82f6;
    --yellow:         #f59e0b;
    --red:            #ef4444;
    --shadow-sm:      0 1px 4px rgba(0,0,0,.35);
    --shadow-md:      0 4px 18px rgba(0,0,0,.50);
    --shadow-lg:      0 12px 40px rgba(0,0,0,.65);
    --radius:         10px;
    --radius-lg:      14px;
    --transition:     all 0.18s cubic-bezier(0.4,0,0.2,1);
  }

  * { font-family: 'Inter', sans-serif; box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg-base);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 256px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    box-shadow: 4px 0 24px rgba(0,0,0,.40);
    position: relative;
    z-index: 10;
  }

  .sidebar-logo {
    padding: 20px 20px 18px;
    display: flex;
    align-items: center;
    gap: 13px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .sidebar-section-label {
    padding: 14px 20px 6px;
    font-size: 9.5px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.10em;
    font-weight: 700;
  }

  .sidebar-item {
    padding: 9px 16px 9px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: var(--transition);
    border-left: 2px solid transparent;
    font-size: 13.5px;
    font-weight: 450;
    color: var(--text-secondary);
    margin: 1px 0;
  }
  .sidebar-item:hover {
    background: rgba(255,255,255,.04);
    color: var(--text-primary);
    border-left-color: var(--border);
  }
  .sidebar-item.active {
    background: var(--accent-dim);
    border-left-color: var(--accent);
    color: var(--accent);
    font-weight: 550;
  }
  .sidebar-item .icon {
    font-size: 15px;
    width: 20px;
    text-align: center;
    flex-shrink: 0;
  }

  /* ── MAIN CONTENT ── */
  .main-content {
    flex: 1;
    overflow-y: auto;
    padding: 32px 36px;
    background: var(--bg-base);
  }

  /* ── CARDS ── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.22s ease;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0 0 auto 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.07) 40%, rgba(255,255,255,.07) 60%, transparent 100%);
    pointer-events: none;
  }
  .card:hover { box-shadow: var(--shadow-md); }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px 24px;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
    transition: var(--transition);
  }
  .stat-card::before {
    content: '';
    position: absolute;
    inset: 0 0 auto 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.08) 40%, rgba(255,255,255,.08) 60%, transparent 100%);
    pointer-events: none;
  }
  .stat-card:hover {
    border-color: rgba(255,255,255,.12);
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }

  /* ── BUTTONS ── */
  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: var(--transition);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 10px rgba(16,185,129,.25);
  }
  .btn-primary:hover {
    background: var(--accent-hover);
    box-shadow: 0 4px 16px rgba(16,185,129,.38);
    transform: translateY(-1px);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: rgba(255,255,255,.06);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover {
    background: rgba(255,255,255,.10);
    color: var(--text-primary);
    border-color: rgba(255,255,255,.14);
  }

  .btn-danger {
    background: rgba(239,68,68,.10);
    color: #ef4444;
    border: 1px solid rgba(239,68,68,.22);
  }
  .btn-danger:hover { background: rgba(239,68,68,.20); }

  /* ── BADGES ── */
  .badge {
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 650;
    display: inline-block;
    letter-spacing: 0.05em;
  }

  /* ── INPUTS ── */
  input, select, textarea {
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-primary);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    width: 100%;
    outline: none;
    transition: var(--transition);
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(16,185,129,.12);
  }
  input::placeholder, textarea::placeholder { color: var(--text-muted); }
  select option { background: var(--bg-card); }

  /* ── TABLES ── */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left;
    padding: 11px 16px;
    color: var(--text-muted);
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.09em;
  }
  td {
    padding: 13px 16px;
    border-bottom: 1px solid rgba(255,255,255,.03);
    color: var(--text-secondary);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.025); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.72);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px;
    width: 500px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    position: relative;
  }
  .modal::before {
    content: '';
    position: absolute;
    inset: 0 0 auto 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    pointer-events: none;
  }

  /* ── MAP ── */
  #map { height: 100%; width: 100%; border-radius: 0; }
  .leaflet-popup-content-wrapper {
    background: var(--bg-card);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow-md);
  }
  .leaflet-popup-tip { background: var(--bg-card); }
  .leaflet-popup-content { margin: 12px 16px; font-size: 13px; }

  /* ── TABS ── */
  .tab {
    padding: 8px 16px;
    cursor: pointer;
    font-size: 13px;
    border-bottom: 2px solid transparent;
    color: var(--text-muted);
    transition: var(--transition);
    font-weight: 500;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text-primary); }

  /* ── HEALTH COLORS ── */
  .health-good      { color: var(--accent); }
  .health-attention { color: var(--yellow); }
  .health-diseased  { color: var(--red); }

  /* ── LOGO ICON ── */
  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(140deg, #10b981, #059669);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 2px 12px rgba(16,185,129,.32), inset 0 1px 0 rgba(255,255,255,.18);
    flex-shrink: 0;
  }

  /* ── PAGE HEADER ── */
  .page-header h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    margin: 0;
    letter-spacing: -0.02em;
  }
  .page-header p {
    color: var(--text-muted);
    font-size: 13.5px;
    margin: 4px 0 0;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.15); }

  /* ── DIVIDER ── */
  .divider { border: none; border-top: 1px solid var(--border-subtle); margin: 0; }

  /* ── MOBILE ── */
  .mobile-header {
    display: none;
    padding: 14px 18px;
    background: var(--bg-sidebar);
    border-bottom: 1px solid var(--border);
    align-items: center;
    justify-content: space-between;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
  }
  .hamburger {
    background: none;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 18px;
    padding: 5px 10px;
    line-height: 1;
  }
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 98;
    backdrop-filter: blur(2px);
  }
  @media (max-width: 768px) {
    body { overflow: auto; }
    .mobile-header { display: flex; }
    #app { flex-direction: column; }
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      z-index: 99;
      transform: translateX(-100%);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
      width: 260px;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.open { display: block; }
    .main-content {
      padding: 72px 14px 24px;
      width: 100%;
    }
    .stat-card, .card { padding: 16px; }
    [style*="grid-template-columns:repeat(4"] { grid-template-columns: repeat(2,1fr) !important; }
    [style*="grid-template-columns:1fr 1fr"] { grid-template-columns: 1fr !important; }
    [style*="grid-template-columns:repeat(3"] { grid-template-columns: repeat(2,1fr) !important; }
    [style*="grid-template-columns:1.1fr 0.9fr"] { grid-template-columns: 1fr !important; }
    /* Map page stacks vertically on mobile */
    .map-split { flex-direction: column !important; height: auto !important; }
    .map-panel { width: 100% !important; max-height: 320px; flex-shrink: 0; }
    .map-canvas { height: 55vh !important; min-height: 280px; }
  }
</style>
</head>

<!-- Mobile header lives OUTSIDE #app so render() never wipes it -->
<div class="mobile-header">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="logo-icon">🍎</div>
    <span style="font-weight:700;font-size:14px;color:#e8f1ff">Adams Apples</span>
  </div>
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
</div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- #app is empty — render() fills it -->
<div id="app" style="display:flex; height:100vh;"></div>

function healthColor(h) { return h === 'healthy' ? '#10b981' : h === 'attention' ? '#f59e0b' : '#ef4444'; }
function healthBg(h)    { return h === 'healthy' ? 'rgba(16,185,129,0.13)' : h === 'attention' ? 'rgba(245,158,11,0.13)' : 'rgba(239,68,68,0.13)'; }

function statusBadge(s) {
  const map = {
    pending:     ['#3b82f6','rgba(59,130,246,0.13)'],
    in_progress: ['#f59e0b','rgba(245,158,11,0.13)'],
    completed:   ['#10b981','rgba(16,185,129,0.13)'],
    sent:        ['#3b82f6','rgba(59,130,246,0.13)'],
    paid:        ['#10b981','rgba(16,185,129,0.13)'],
    overdue:     ['#ef4444','rgba(239,68,68,0.13)'],
    draft:       ['#6e8fb5','rgba(110,143,181,0.13)'],
  };
  const [c, bg] = map[s] || ['#6e8fb5','rgba(110,143,181,0.13)'];
  return `<span class="badge" style="color:${c};background:${bg}">${s.replace('_',' ').toUpperCase()}</span>`;
}

function priorityBadge(p) {
  const map = {
    high:   ['#ef4444','rgba(239,68,68,0.13)'],
    medium: ['#f59e0b','rgba(245,158,11,0.13)'],
    low:    ['#10b981','rgba(16,185,129,0.13)'],
  };
  const [c, bg] = map[p] || ['#6e8fb5','rgba(110,143,181,0.13)'];
  return `<span class="badge" style="color:${c};background:${bg}">${p.toUpperCase()}</span>`;
}

function uid() { return 'id_' + Math.random().toString(36).substr(2,9); }

function initMap() {
  if (state.mapInstance) { state.mapInstance.remove(); state.mapInstance = null; }
  const map = L.map('map', { zoomControl: false }).setView([46.8, -120.5], 7);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    maxZoom: 20
  }).addTo(map);
  state.mapInstance = map;
  state.treeMarkers = [];

  DATA.locations.forEach(loc => {
    const treeCt = getTreesForLocation(loc.id).length;
    const icon = L.divIcon({
      className: '',
      html: `<div style="background:#10b981;color:#fff;font-weight:700;font-size:11px;width:30px;height:30px;border-radius:999px;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.9);box-shadow:0 3px 10px rgba(0,0,0,.4)">${treeCt}</div>`,
      iconSize: [30,30],
      iconAnchor: [15,15]
    });
    const marker = L.marker([loc.lat, loc.lng], { icon }).addTo(map);
    marker.bindPopup(`<b>${loc.name}</b><br><span style="color:#6e8fb5">${getClient(loc.clientId)?.name||''}</span><br>${treeCt} trees · ${loc.acreage} ac`);
    marker.on('click', () => selectLocation(loc.id));
  });

  if (state.selectedLocationId) {
    showTreesOnMap();
  } else {
    fitAllLocations();
  }

  map.on('click', function(e) {
    if (state.addingTree && state.selectedLocationId) {
      showAddTreeModal(e.latlng.lat, e.latlng.lng);
    }
  });
}

function fitAllLocations() {
  if (!state.mapInstance) return;
  const bounds = L.latLngBounds(DATA.locations.map(l => [l.lat, l.lng]));
  state.mapInstance.fitBounds(bounds, { padding: [60,60] });
}

function selectLocation(locId) {
  state.selectedLocationId = locId;
  const loc = getLocation(locId);
  if (state.mapInstance && loc) {
    state.mapInstance.setView([loc.lat, loc.lng], 16);
  }
  showTreesOnMap();
  updateMapSidebar();
}

function showTreesOnMap() {
  if (!state.mapInstance) return;
  state.treeMarkers.forEach(m => state.mapInstance.removeLayer(m));
  state.treeMarkers = [];
  if (!state.selectedLocationId) return;
  const trees = getTreesForLocation(state.selectedLocationId);
  trees.forEach(tree => {
    const variety = getVariety(tree.scionVarietyId);
    const rootstock = tree.rootstockVarietyId ? getVariety(tree.rootstockVarietyId) : null;
    const color = healthColor(tree.health);
    const icon = L.divIcon({
      className: '',
      html: `<div style="background:${color};width:14px;height:14px;border-radius:999px;border:2px solid rgba(255,255,255,.85);box-shadow:0 2px 6px rgba(0,0,0,.4);cursor:pointer"></div>`,
      iconSize: [14,14],
      iconAnchor: [7,7]
    });
    const marker = L.marker([tree.lat, tree.lng], { icon }).addTo(state.mapInstance);
    marker.bindPopup(`
      <div style="min-width:180px">
        <div style="font-weight:700;font-size:14px;margin-bottom:8px;color:#e8f1ff">${tree.treeNumber}</div>
        <div style="margin-bottom:4px"><span style="color:#6e8fb5">Variety:</span> <span style="color:#c4d6ef">${variety?.name||'Unknown'}</span></div>
        ${rootstock?`<div style="margin-bottom:4px"><span style="color:#6e8fb5">Rootstock:</span> <span style="color:#c4d6ef">${rootstock.name}</span></div>`:''}
        <div style="margin-bottom:4px"><span style="color:#6e8fb5">Stage:</span> <span style="color:#c4d6ef">${tree.stage}</span></div>
        <div style="margin-bottom:4px"><span style="color:#6e8fb5">Health:</span> <span style="color:${color};font-weight:650">${tree.health.toUpperCase()}</span></div>
        <div style="margin-bottom:4px"><span style="color:#6e8fb5">Block/Row:</span> <span style="color:#c4d6ef">${tree.block}-${tree.row}-${tree.position}</span></div>
        <div><span style="color:#6e8fb5">Planted:</span> <span style="color:#c4d6ef">${tree.plantingDate}</span></div>
      </div>
    `);
    state.treeMarkers.push(marker);
  });
}

  const panel = document.getElementById('map-tree-panel');

    return `<div style="padding:9px 12px;border-radius:8px;margin-bottom:5px;background:rgba(255,255,255,.025);border:1px solid #16304f;font-size:12px;cursor:pointer;transition:all .15s ease" onclick="panToTree('${t.id}')"

      <div style="display:flex;justify-content:space-between;align-items:center">

      </div>
      <div style="color:#6e8fb5;margin-top:3px">${v?.name||'Unknown'} · <span style="color:#4a6a8a">${t.stage}</span></div>
    </div>`;
  }).join('');
}

function panToTree(treeId) {
  const tree = DATA.trees.find(t=>t.id===treeId);
  if (tree && state.mapInstance) {
    state.mapInstance.setView([tree.lat, tree.lng], 18);
    const marker = state.treeMarkers.find(m => {
      const ll = m.getLatLng();
      return Math.abs(ll.lat - tree.lat) < 0.0001 && Math.abs(ll.lng - tree.lng) < 0.0001;
    });
    if (marker) marker.openPopup();
  }
}

function addTree(lat, lng) {
  const num = document.getElementById('new-tree-number').value;

    id: uid(),
    treeNumber: num,
    locationId: state.selectedLocationId,
    scionVarietyId: scion,
    rootstockVarietyId: document.getElementById('new-tree-rootstock').value || null,
    stage: document.getElementById('new-tree-stage').value,
    health: 'healthy',
    block: document.getElementById('new-tree-block').value || '',
    row: document.getElementById('new-tree-row').value || '',
    position: parseInt(document.getElementById('new-tree-pos').value) || 0,
    lat, lng,
    plantingDate: document.getElementById('new-tree-date').value,
  };
  DATA.trees.push(newTree);

  updateMapSidebar();

function renderTreeRows(trees) {

      <td style="color:#4a6a8a">${t.plantingDate}</td>
    </tr>`;
  }).join('');
}

function filterTreeTable() {
  const q = (document.getElementById('tree-search')?.value||'').toLowerCase();
  const h = document.getElementById('tree-health-filter')?.value||'';
  const l = document.getElementById('tree-loc-filter')?.value||'';
  document.querySelectorAll('.tree-row').forEach(row => {
    const matchSearch = !q || row.dataset.search.toLowerCase().includes(q);
    const matchHealth = !h || row.dataset.health === h;
    const matchLoc    = !l || row.dataset.loc === l;
    row.style.display = (matchSearch && matchHealth && matchLoc) ? '' : 'none';
  });
}

      <p>${DATA.invoices.length} invoices · ${DATA.invoices.filter(i=>i.status==='paid').length} paid</p>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px">
      <div class="stat-card">
        <div style="color:#364f6e;font-size:10.5px;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em">Total Billed</div>
        <div style="font-size:28px;font-weight:700;color:#e8f1ff;letter-spacing:-0.02em">$${totalBilled.toLocaleString()}</div>
      </div>
      <div class="stat-card">
        <div style="color:#364f6e;font-size:10.5px;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em">Total Collected</div>
        <div style="font-size:28px;font-weight:700;color:#10b981;letter-spacing:-0.02em">$${totalPaid.toLocaleString()}</div>
      </div>
      <div class="stat-card">
        <div style="color:#364f6e;font-size:10.5px;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em">Outstanding</div>
        <div style="font-size:28px;font-weight:700;color:#ef4444;letter-spacing:-0.02em">$${totalOutstanding.toLocaleString()}</div>
      </div>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      <table>
        <thead><tr><th>Invoice</th><th>Client</th><th>Date</th><th>Due Date</th><th>Subtotal</th><th>Tax</th><th>Total</th><th>Paid</th><th>Status</th></tr></thead>
        <tbody>
          ${DATA.invoices.map(inv => {
            const client = getClient(inv.clientId);
            return `<tr>
              <td style="font-family:monospace;font-weight:650;color:#e8f1ff;font-size:12px">${inv.number}</td>
              <td style="color:#c4d6ef;font-weight:500">${client?.name||''}</td>
              <td style="color:#4a6a8a">${inv.date}</td>
              <td style="color:#4a6a8a">${inv.dueDate}</td>
              <td style="color:#c4d6ef">$${inv.subtotal.toLocaleString()}</td>
              <td style="color:#364f6e">$${inv.tax.toLocaleString()}</td>
              <td style="font-weight:650;color:#e8f1ff">$${inv.total.toLocaleString()}</td>
              <td style="color:${inv.paid>=inv.total?'#10b981':'#ef4444'};font-weight:650">$${inv.paid.toLocaleString()}</td>
              <td>${statusBadge(inv.status)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

// ============================================
// INIT
// ============================================
render();
</script>
</body>
</html>
